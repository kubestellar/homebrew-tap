name: Homebrew CI

on:
  push:
    branches: [main]
    paths:
      - 'Formula/**'
      - '.github/workflows/brew-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Formula/**'
      - '.github/workflows/brew-ci.yml'

jobs:
  brew-audit-and-install:
    name: brew audit + install smoke test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew tap
        run: |
          # Register this repo as a local tap so brew can resolve formula paths
          brew tap kubestellar/tap "$(pwd)"

      - name: brew audit --strict (all formulae)
        run: |
          for formula in Formula/*.rb; do
            name=$(basename "$formula" .rb)
            echo "::group::brew audit --strict kubestellar/tap/$name"
            brew audit --strict "kubestellar/tap/$name"
            echo "::endgroup::"
          done

      - name: brew install smoke test (all formulae)
        run: |
          for formula in Formula/*.rb; do
            name=$(basename "$formula" .rb)
            echo "::group::brew install kubestellar/tap/$name"
            brew install --formula "kubestellar/tap/$name"
            echo "::endgroup::"
          done

      - name: brew test (all formulae)
        run: |
          for formula in Formula/*.rb; do
            name=$(basename "$formula" .rb)
            echo "::group::brew test kubestellar/tap/$name"
            brew test "kubestellar/tap/$name" || true
            echo "::endgroup::"
          done
