name: Homebrew CI

on:
  push:
    branches: [main]
    paths:
      - 'Formula/**'
      - '.github/workflows/brew-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Formula/**'
      - '.github/workflows/brew-ci.yml'

permissions:
  contents: read

jobs:
  brew-audit-and-install:
    name: brew audit + install smoke test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Homebrew tap
        run: |
          # Register this repo as a local tap so brew can resolve formula paths
          brew tap kubestellar/tap "$(pwd)"

      - name: brew audit --strict (all formulae)
        run: |
          for formula in Formula/*.rb; do
            name=$(basename "$formula" .rb)
            echo "::group::brew audit --strict kubestellar/tap/$name"
            brew audit --strict "kubestellar/tap/$name"
            echo "::endgroup::"
          done

      - name: brew install smoke test (available formulae)
        run: |
          event_name="${{ github.event_name }}"
          for formula in Formula/*.rb; do
            name=$(basename "$formula" .rb)
            echo "::group::brew fetch kubestellar/tap/$name"
            if brew fetch --formula "kubestellar/tap/$name"; then
              echo "::endgroup::"
              echo "::group::brew install kubestellar/tap/$name"
              brew install --formula "kubestellar/tap/$name"
            else
              echo "::endgroup::"
              if [ "$event_name" = "pull_request" ]; then
                echo "::notice title=Skipping install::Release artifact for kubestellar/tap/$name is not available yet"
                continue
              fi
              echo "::error title=Missing release artifact::kubestellar/tap/$name could not be fetched"
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: brew test (installed formulae)
        run: |
          for formula in Formula/*.rb; do
            name=$(basename "$formula" .rb)
            if ! brew list --formula | grep -qx "$name"; then
              echo "::notice title=Skipping test::kubestellar/tap/$name was not installed"
              continue
            fi
            echo "::group::brew test kubestellar/tap/$name"
            brew test "kubestellar/tap/$name"
            echo "::endgroup::"
          done
