name: Homebrew CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-bot:
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - macos-13
          - macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        run: brew install-bundler-gems

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Run brew audit
        run: |
          brew tap kubestellar/tap .
          brew audit --strict --online --skip-style kubestellar/tap

  install-test:
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - macos-13
          - macos-14
        formula:
          - kc-agent
          - kubestellar-console
          - kubestellar-deploy
          - kubestellar-ops
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Install formula
        run: |
          brew tap kubestellar/tap .
          brew install --verbose kubestellar/tap/${{ matrix.formula }}

      - name: Run formula test
        run: |
          brew test kubestellar/tap/${{ matrix.formula }}

      - name: Verify installation
        run: |
          brew info kubestellar/tap/${{ matrix.formula }}
          which ${{ matrix.formula }}
          ${{ matrix.formula }} --version || ${{ matrix.formula }} --help || true
