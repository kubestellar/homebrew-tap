name: Greetings

on:
  pull_request_target:
    types: [opened, reopened]
  issues:
    types: [opened, reopened]

permissions: read-all

jobs:
  greet:
    # Fork guard: restrict pull_request_target to same-repo PRs only.
    # Prevents untrusted fork contributors from triggering this workflow
    # with write token access (re-adds guard removed by PR #137).
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      issues: write
      pull-requests: write
    uses: kubestellar/infra/.github/workflows/reusable-greetings.yml@main
    secrets: inherit
