name: PR Verifier

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions: read-all

jobs:
  verify-pr-title:
    name: Verify PR Title
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: read
      statuses: write
    steps:
      - name: Validate PR title (Conventional Commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Allow optional [actor] prefix (e.g. "[scanner] ") before the conventional commit type.
          # Valid format: [optional-prefix] type(optional-scope)!?: description
          # Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert
          PATTERN='^(\[[^]]+\] )?(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'
          if echo "$PR_TITLE" | grep -qP "$PATTERN"; then
            echo "PR title is valid: $PR_TITLE"
          else
            echo "::error::PR title does not match Conventional Commits format."
            echo "Expected: [optional-prefix] type(optional-scope): description"
            echo "Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo "Examples: 'fix: correct typo', '[scanner] fix: pin SHA', 'feat(scope): add feature'"
            echo ""
            echo "Received: $PR_TITLE"
            exit 1
          fi
