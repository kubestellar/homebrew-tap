name: PR Verifier

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  checks: write
  pull-requests: read

jobs:
  verify:
    # Skip for Dependabot PRs - the reusable workflow may not support dependabot's token
    if: github.actor != 'dependabot[bot]'
    uses: kubestellar/infra/.github/workflows/reusable-pr-verifier.yml@main
    secrets: inherit
